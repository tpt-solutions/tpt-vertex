name: Desktop

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - "desktop/**"
      - "tpt-vertex-kernel/**"
      - "manufacturing/**"
      - ".github/workflows/desktop.yml"
  pull_request:
    branches: [main]
    paths:
      - "desktop/**"
      - ".github/workflows/desktop.yml"

jobs:
  build:
    name: Package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install desktop dependencies
        run: npm install
        working-directory: desktop

      - name: Rust backend tests
        run: cargo test --manifest-path desktop/src-tauri/Cargo.toml

      # Signing secrets are injected in CI for tagged releases; PR builds are
      # unsigned. See desktop/README.md for the required secrets per OS.
      - name: Build desktop bundles
        run: npm run build
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: tpt-vertex-desktop-${{ matrix.os }}
          path: desktop/src-tauri/target/release/bundle/**
          if-no-files-found: ignore
